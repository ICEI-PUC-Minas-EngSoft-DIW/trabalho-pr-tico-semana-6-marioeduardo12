<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SomHub - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho-site">
        <div class="container">
            <div class="row align-items-center py-3">
                <div class="col-12 col-md-4 text-center text-md-start logo-site">
                    <h1>SomHub</h1>
                    <p>Sua música, seu jeito</p>
                </div>
                <nav class="col-12 col-md-8 menu-principal">
                    <ul class="nav justify-content-center justify-content-md-end">
                        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                        <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastro</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <section class="formulario-novidades">
                        <h2 class="mb-2">Criar conta no SomHub</h2>
                        <p class="texto-apoio">Preencha seus dados para começar a ouvir.</p>
                        <form action="#" method="post">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Seu nome completo" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="seuemail@gmail.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha" required>
                            </div>
                            <button type="submit" class="botao botao-primario">Cadastrar</button>
                            <a class="botao botao-secundario" href="login.html">Já tenho conta</a>
                        </form>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-site">
        <div class="container">
            <div class="row align-items-center py-3">
                <div class="col-12 col-md-6 text-center text-md-start">
                    <p class="mb-0">SomHub © 2026 - DIW</p>
                </div>
                <div class="col-12 col-md-6 text-center text-md-end link-rodape">
                    <a href="#">Sobre</a>
                    <a href="#">Ajuda</a>
                    <a href="#">Termos</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
